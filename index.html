<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Vocacional</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <div id="inicio">

        <h1>🎓 Teste Vocacional</h1>

        <p class="subtitulo">
            Descubra quais áreas profissionais combinam mais com você.
        </p>

        <button id="btnComecar">
            Iniciar Teste
        </button>

    </div>

    <div id="quiz" class="oculto">

        <div class="topo">

            <div class="progresso">

                <div id="barra"></div>

            </div>

            <p id="contador">
                Pergunta 1 de 15
            </p>

        </div>

        <h2 id="pergunta"></h2>

        <div id="opcoes"></div>

    </div>

    <div id="resultado" class="oculto">

        <h1>Seu Resultado</h1>

        <p class="textoResultado">
            As áreas abaixo foram as que mais combinaram com seu perfil.
        </p>

        <div id="ranking"></div>

        <button id="refazer">
            Refazer Teste
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
